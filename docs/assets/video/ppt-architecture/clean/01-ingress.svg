<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style>
      .box-text { font: 700 34px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #1F2933; }
      .sub-text { font: 400 22px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #616E7C; }
    </style>
    <marker id="arrow" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#667085" />
    </marker>
  </defs>

  <rect x="120" y="330" width="300" height="120" rx="26" ry="26" fill="#FFF5DE" stroke="#D99C29" stroke-width="4" />
  <text x="270" y="382" text-anchor="middle" class="box-text">Mailbox</text>
  <text x="270" y="418" text-anchor="middle" class="sub-text">Gmail</text>

  <rect x="120" y="540" width="300" height="120" rx="26" ry="26" fill="#FFF5DE" stroke="#D99C29" stroke-width="4" />
  <text x="270" y="592" text-anchor="middle" class="box-text">Test Lab / API</text>

  <rect x="520" y="250" width="340" height="120" rx="26" ry="26" fill="#EEF4FF" stroke="#4F7DF0" stroke-width="4" />
  <text x="690" y="302" text-anchor="middle" class="box-text">Control Plane</text>
  <text x="690" y="338" text-anchor="middle" class="sub-text">API</text>

  <rect x="520" y="470" width="340" height="150" rx="26" ry="26" fill="#EAF8F0" stroke="#2FA86B" stroke-width="4" />
  <text x="690" y="530" text-anchor="middle" class="box-text">Ticket</text>
  <text x="690" y="570" text-anchor="middle" class="sub-text">Queue / State</text>

  <line x1="420" y1="390" x2="520" y2="310" stroke="#667085" stroke-width="6" marker-end="url(#arrow)" />
  <line x1="420" y1="600" x2="520" y2="310" stroke="#667085" stroke-width="6" marker-end="url(#arrow)" />
  <line x1="690" y1="370" x2="690" y2="470" stroke="#667085" stroke-width="6" marker-end="url(#arrow)" />
</svg>
